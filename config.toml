[nas]
mount_path = "/mnt/tank/backups/inkwell"

[schedule]
cron = "0 3 * * *"

[download]
retry_attempts = 3
retry_backoff = [5, 15, 45]
timeout = 600
inter_artist_cooldown = [30, 60]

[cookies]
expiry_warning_days = 30

[auth]
password_hash = ""

[retention]
log_days = 90

[rate_limit]
multiplier_step = 1.5
max_multiplier = 8.0
pause_threshold = 6.0
decay_rate = 0.5

[sites.xcom]
cooldown = [30, 60]

[sites.pixiv]
cooldown = [5, 15]

[sites.deviantart]
cooldown = [5, 15]
