services:
    inkwell:
        image: ghcr.io/nathanpt/inkwell:latest
        # build: .  # uncomment for local development builds
        container_name: inkwell
        ports:
            - "8501:8501"
        volumes:
            - inkwell-data:/app/data # SQLite DB (persisted in named Docker volume)
            - ./config.toml:/app/config/config.toml:ro # App config (bind-mounted read-only)
            - ./gallery-dl.xcom.conf:/app/config/gallery-dl.xcom.conf:ro # gallery-dl X.com config
            - ./gallery-dl.pixiv.conf:/app/config/gallery-dl.pixiv.conf:ro # gallery-dl Pixiv config
            - ./gallery-dl.deviantart.conf:/app/config/gallery-dl.deviantart.conf:ro # gallery-dl DeviantArt config
            - /mnt/tank/backups/inkwell:/nas/inkwell:rw # NAS media storage (change to match your mount)
        environment:
            - INKWELL_PASSWORD=${INKWELL_PASSWORD}
        restart: unless-stopped

volumes:
    inkwell-data:
