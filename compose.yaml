services:
  inkwell:
    image: ghcr.io/nathanpt/inkwell:latest
    # build: .  # uncomment for local development builds
    container_name: inkwell
    ports:
      - "8501:8501"
    volumes:
      - inkwell-data:/app/data
      - ./config.toml:/app/config/config.toml:ro
      - ./gallery-dl.xcom.conf:/app/config/gallery-dl.xcom.conf:ro
      - ./gallery-dl.pixiv.conf:/app/config/gallery-dl.pixiv.conf:ro
      - ./gallery-dl.deviantart.conf:/app/config/gallery-dl.deviantart.conf:ro
      - /nas/inkwell:/nas/inkwell:rw
    environment:
      - INKWELL_PASSWORD=${INKWELL_PASSWORD}
    restart: unless-stopped

volumes:
  inkwell-data:
