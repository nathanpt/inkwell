services:
    inkwell:
        image: ghcr.io/nathanpt/inkwell:latest
        # build: .  # uncomment for local development builds
        container_name: inkwell
        ports:
            - "8501:8501"
        volumes:
            - inkwell-data:/app/data # SQLite DB (persisted in named Docker volume)
            - ./config:/app/config:ro # Config directory (bind-mounted read-only)
            - /path/to/media:/nas/inkwell:rw # NAS media storage (change to match your mount)
        environment:
            - INKWELL_PASSWORD=${INKWELL_PASSWORD}
        restart: unless-stopped

volumes:
    inkwell-data:
